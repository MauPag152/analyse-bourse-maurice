<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Maurice V7 - Mémoire Active</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] p-4 text-white font-sans">
    <div class="max-w-[1600px] mx-auto space-y-4">
        
        <div class="bg-slate-800 p-4 rounded-xl border-l-8 border-yellow-500 shadow-xl flex flex-wrap justify-between items-center gap-4">
            <div>
                <h1 class="text-xl font-bold text-yellow-400 uppercase">Terminal Maurice V7</h1>
                <p class="text-slate-400 text-xs text-nowrap">Configuration sauvegardée automatiquement</p>
            </div>
            
            <div class="flex items-center gap-2">
                <input type="text" id="symbol-input" placeholder="Ex: SPYM, TSLA, BTCUSD" 
                       class="bg-slate-900 border border-slate-700 px-4 py-2 rounded-lg text-white font-bold uppercase outline-none focus:ring-2 focus:ring-yellow-500 w-40 md:w-64">
                <button onclick="changeSymbol()" 
                        class="bg-yellow-600 hover:bg-yellow-500 text-slate-900 px-6 py-2 rounded-lg font-bold transition-all shadow-lg active:scale-95 text-nowrap">
                    Analyser
                </button>
            </div>
        </div>

        <div class="bg-slate-800 p-2 rounded-xl shadow-2xl border border-slate-700">
            <div id="tradingview_chart" class="h-[750px]"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
      function loadWidget(symbol) {
        new TradingView.widget({
          "autosize": true,
          "symbol": symbol,
          "interval": "D",
          "timezone": "America/New_York",
          "theme": "dark",
          "style": "1",
          "locale": "fr",
          "toolbar_bg": "#f1f3f6",
          "enable_publishing": true, // Permet la sauvegarde des réglages
          "withdateranges": true,
          "hide_side_toolbar": false,
          "allow_symbol_change": true,
          "save_image": true,
          "container_id": "tradingview_chart",
          "studies": [
            { "id": "MASimple@tv-basicstudies", "inputs": { "length": 20 }, "title": "MA 20", "plots": [{ "id": "plot_0", "color": "#4ade80" }] },
            { "id": "MASimple@tv-basicstudies", "inputs": { "length": 50 }, "title": "MA 50", "plots": [{ "id": "plot_0", "color": "#fb923c" }] },
            { "id": "MASimple@tv-basicstudies", "inputs": { "length": 200 }, "title": "MA 200", "plots": [{ "id": "plot_0", "color": "#f87171" }] },
            { "id": "RSI@tv-basicstudies", "inputs": { "length": 14 } },
            { "id": "Volume@tv-basicstudies" }
          ],
          "width": "100%",
          "height": 750
        });
      }

      function changeSymbol() {
        const input = document.getElementById('symbol-input').value.trim().toUpperCase();
        if (input) loadWidget(input);
      }

      loadWidget("AMEX:SPYM");
    </script>
</body>
</html>
