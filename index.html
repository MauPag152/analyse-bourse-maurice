<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Boursier Instantané - Maurice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .tradingview-widget-container { height: 600px; width: 100%; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[1600px] mx-auto space-y-4">
        <div class="bg-slate-800 p-6 rounded-xl border-l-8 border-blue-500 shadow-xl flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">TERMINAL MAURICE V3 (INSTANTANÉ)</h1>
                <p class="text-slate-400">Graphique Professionnel 25x8 - Flux Temps Réel</p>
            </div>
            <div class="text-right">
                <span class="bg-blue-900 text-blue-200 px-3 py-1 rounded-full text-xs font-bold">MODE RÉSEAU FIBRE</span>
            </div>
        </div>

        <div class="bg-slate-800 p-2 rounded-xl shadow-2xl border border-slate-700">
            <div id="tradingview_chart"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
      new TradingView.widget({
        "autosize": true,
        "symbol": "NASDAQ:AAPL",
        "interval": "D",
        "timezone": "America/New_York",
        "theme": "dark",
        "style": "3",
        "locale": "fr",
        "toolbar_bg": "#f1f3f6",
        "enable_publishing": false,
        "hide_top_toolbar": false,
        "save_image": false,
        "container_id": "tradingview_chart",
        "width": "100%",
        "height": 600
      });
    </script>
</body>
</html>
